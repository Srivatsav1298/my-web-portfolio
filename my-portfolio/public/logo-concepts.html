<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SV Logo Concepts</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
        }

        .container {
            width: 320px;
            background: linear-gradient(145deg, #111 0%, #0a0a0a 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .title {
            margin-bottom: 30px;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #d1d1d1;
            text-align: center;
        }

        svg {
            width: 120px;
            height: 120px;
            overflow: visible;
        }

        /* --- Concept 1: Neural Synapse --- */
        .c1-line {
            fill: none;
            stroke: #0ff;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 400;
            stroke-dashoffset: 400;
            animation: c1-draw 4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            filter: drop-shadow(0 0 5px rgba(0, 255, 255, 0.5));
        }

        .c1-node {
            fill: #fff;
            opacity: 0;
            animation: c1-nodes 4s ease-in-out infinite;
            filter: drop-shadow(0 0 8px #0ff);
        }

        @keyframes c1-draw {

            0%,
            10% {
                stroke-dashoffset: 400;
                opacity: 0;
            }

            40%,
            80% {
                stroke-dashoffset: 0;
                opacity: 1;
            }

            100% {
                stroke-dashoffset: -400;
                opacity: 0;
            }
        }

        @keyframes c1-nodes {

            0%,
            20% {
                opacity: 0;
                transform: scale(0);
            }

            35%,
            85% {
                opacity: 1;
                transform: scale(1);
            }

            100% {
                opacity: 0;
                transform: scale(0);
            }
        }

        /* --- Concept 2: Cybernetic Origami --- */
        .c2-path {
            fill: none;
            stroke: url(#c2-grad);
            stroke-width: 6;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 300;
            stroke-dashoffset: 300;
            animation: c2-draw 5s ease-in-out infinite;
        }

        .c2-pulse {
            fill: none;
            stroke: #fff;
            stroke-width: 2;
            filter: drop-shadow(0 0 4px #fff);
            stroke-dasharray: 0 300;
            animation: c2-pulse-anim 5s linear infinite;
        }

        @keyframes c2-draw {
            0% {
                stroke-dashoffset: 300;
            }

            40%,
            70% {
                stroke-dashoffset: 0;
            }

            100% {
                stroke-dashoffset: -300;
            }
        }

        @keyframes c2-pulse-anim {

            0%,
            40% {
                stroke-dasharray: 0 300;
                stroke-dashoffset: 0;
                opacity: 0;
            }

            50% {
                opacity: 1;
            }

            60%,
            100% {
                stroke-dasharray: 30 300;
                stroke-dashoffset: -300;
                opacity: 0;
            }
        }

        /* --- Concept 3: Data Stream Matrix --- */
        .c3-bar {
            fill: #0ff;
            opacity: 0.1;
            transform-origin: bottom;
            animation: c3-matrix 3s ease-in-out infinite alternate;
        }

        .c3-bar.highlight {
            fill: #fff;
            opacity: 0.9;
            filter: drop-shadow(0 0 5px #0ff);
        }

        @keyframes c3-matrix {
            0% {
                transform: scaleY(0.1);
                opacity: 0;
            }

            50% {
                transform: scaleY(1);
                opacity: 0.5;
            }

            100% {
                transform: scaleY(0.8);
                opacity: 1;
            }
        }

        .c3-scanner {
            fill: url(#c3-scan-grad);
            opacity: 0.5;
            animation: c3-scan 3s linear infinite;
        }

        @keyframes c3-scan {
            0% {
                transform: translateY(-20px);
            }

            100% {
                transform: translateY(120px);
            }
        }
    </style>
</head>

<body>

    <!-- Concept 1: Neural Synapse -->
    <div class="container">
        <div class="title">1. The Neural Synapse</div>
        <svg viewBox="0 0 100 100">
            <!-- V Path -->
            <path class="c1-line" d="M 20 20 L 50 80 L 80 20" />
            <!-- S Path -->
            <path class="c1-line" style="animation-delay: 0.5s"
                d="M 80 35 C 70 20, 30 20, 30 40 C 30 60, 70 60, 70 80 C 70 100, 30 90, 20 75" />

            <!-- Nodes (Intersections and endpoints) -->
            <circle class="c1-node" cx="20" cy="20" r="3" style="animation-delay: 0.4s" />
            <circle class="c1-node" cx="50" cy="80" r="4" style="animation-delay: 0.8s" />
            <circle class="c1-node" cx="80" cy="20" r="3" style="animation-delay: 1.2s" />

            <circle class="c1-node" cx="80" cy="35" r="2.5" style="animation-delay: 0.6s" />
            <circle class="c1-node" cx="30" cy="40" r="2.5" style="animation-delay: 0.9s" />
            <circle class="c1-node" cx="70" cy="80" r="2.5" style="animation-delay: 1.1s" />
            <circle class="c1-node" cx="20" cy="75" r="3" style="animation-delay: 1.4s" />
        </svg>
    </div>

    <!-- Concept 2: Cybernetic Origami -->
    <div class="container">
        <div class="title">2. Cybernetic Origami</div>
        <svg viewBox="0 0 100 100">
            <defs>
                <linearGradient id="c2-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stopColor="#ffffff" />
                    <stop offset="50%" stopColor="#666666" />
                    <stop offset="100%" stopColor="#222222" />
                </linearGradient>
            </defs>
            <!-- Continuous geometric ribbon forming S and V -->
            <path id="origami-path" class="c2-path"
                d="M 25 30 L 50 85 L 75 30 C 65 10, 35 10, 25 30 C 25 55, 75 45, 75 70 C 75 90, 35 90, 25 70" />

            <!-- Glowing energy pulse running along the ribbon -->
            <path class="c2-pulse"
                d="M 25 30 L 50 85 L 75 30 C 65 10, 35 10, 25 30 C 25 55, 75 45, 75 70 C 75 90, 35 90, 25 70" />
        </svg>
    </div>

    <!-- Concept 3: Data Stream Matrix -->
    <div class="container">
        <div class="title">3. The Data Stream Matrix</div>
        <svg viewBox="0 0 100 100">
            <defs>
                <linearGradient id="c3-scan-grad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stopColor="transparent" />
                    <stop offset="80%" stopColor="#0ff" stop-opacity="0.3" />
                    <stop offset="100%" stopColor="#fff" />
                </linearGradient>
            </defs>

            <!-- Data bars - forming an S & V shape from opacity/height -->
            <g>
                <!-- S Curve bars -->
                <rect class="c3-bar highlight" x="15" y="20" width="8" height="15" style="animation-delay: 0.1s" />
                <rect class="c3-bar highlight" x="25" y="15" width="8" height="10" style="animation-delay: 0.2s" />
                <rect class="c3-bar highlight" x="35" y="15" width="8" height="10" style="animation-delay: 0.3s" />
                <rect class="c3-bar highlight" x="45" y="20" width="8" height="15" style="animation-delay: 0.4s" />

                <rect class="c3-bar highlight" x="15" y="40" width="8" height="20" style="animation-delay: 0.5s" />
                <rect class="c3-bar highlight" x="25" y="45" width="8" height="10" style="animation-delay: 0.6s" />
                <rect class="c3-bar highlight" x="35" y="45" width="8" height="10" style="animation-delay: 0.7s" />
                <rect class="c3-bar highlight" x="45" y="40" width="8" height="20" style="animation-delay: 0.8s" />

                <rect class="c3-bar highlight" x="15" y="65" width="8" height="15" style="animation-delay: 0.6s" />
                <rect class="c3-bar highlight" x="25" y="75" width="8" height="10" style="animation-delay: 0.5s" />
                <rect class="c3-bar highlight" x="35" y="75" width="8" height="10" style="animation-delay: 0.4s" />
                <rect class="c3-bar highlight" x="45" y="65" width="8" height="15" style="animation-delay: 0.3s" />

                <!-- V Shape bars (Interwoven) -->
                <rect class="c3-bar highlight" x="55" y="20" width="8" height="30" style="animation-delay: 0.7s" />
                <rect class="c3-bar highlight" x="65" y="40" width="8" height="30" style="animation-delay: 0.8s" />
                <rect class="c3-bar highlight" x="75" y="60" width="8" height="25" style="animation-delay: 0.9s" />
                <rect class="c3-bar highlight" x="85" y="20" width="8" height="30" style="animation-delay: 0.2s" />

                <!-- Background ambient bars -->
                <rect class="c3-bar" x="5" y="30" width="4" height="60" style="animation-delay: 0.9s" />
                <rect class="c3-bar" x="95" y="10" width="4" height="80" style="animation-delay: 0.1s" />
            </g>

            <!-- Scanning laser over the data -->
            <rect class="c3-scanner" x="0" y="0" width="100" height="20" />
        </svg>
    </div>

</body>

</html>
