name: Deploy to kamkan.vip/vatsav

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: my-portfolio/package-lock.json

      - name: Install dependencies
        working-directory: my-portfolio
        run: npm ci

      - name: Build with /vatsav/ base path
        working-directory: my-portfolio
        run: npx vite build --base /vatsav/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Deploy to S3
        run: |
          aws s3 sync my-portfolio/dist/ s3://kamkan.vip/vatsav/ \
            --region eu-central-1 \
            --delete \
            --exclude ".DS_Store"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E2OSBPWI2M7C5Q \
            --paths "/vatsav/*"
